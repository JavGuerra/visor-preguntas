<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuestionario (visor de preguntas)</title>
  <meta name="author" content="Javier Guerra" />
  <style>
    :root{
      --bg: #0f172a; --muted: #94a3b8; --text: #e5e7eb; --accent: #22d3ee;
      --ok-bd: #34d399; --ok-tx: #d1fae5;
      --shadow: 0 6px 30px rgba(0,0,0,.35), 0 2px 10px rgba(0,0,0,.25);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(1200px 800px at 20% 10%, #0b1227 0%, #0f172a 40%, #0b1020 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      padding: 24px;
      overflow: auto;
    }
    .container {
      width: min(900px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 16px; backdrop-filter: blur(6px); box-shadow: var(--shadow); overflow: clip;
      margin: auto;
    }    
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 18px 22px; border-bottom: 1px solid rgba(148,163,184,0.15);
      background:
        radial-gradient(600px 200px at 0% 0%, rgba(34,211,238,.08), transparent 60%),
        radial-gradient(800px 300px at 100% 0%, rgba(125,211,252,.06), transparent 60%);
    }
    .badge { display: inline-flex; align-items: center; gap: 8px; color: var(--muted);
      padding: 4px 18px 8px; border: 1px solid rgba(148,163,184,0.25); border-radius: 999px; background: rgba(2,6,23,0.35); }
    header .badge { font-size: 14px; font-weight: 600; color: var(--accent); }
    .badge .dot { display: none; }
    .counter { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text); }
    .content { padding: 20px 22px 6px 22px; }
    .question-title { font-size: clamp(18px, 2.2vw, 22px); font-weight: 700; margin: 0 0 14px 0; color: #f1f5f9; text-wrap: balance; }
    .options { display: grid; gap: 10px; margin: 0; padding-left: 1.25rem; list-style: disc; }
    .options li::marker { color: var(--accent); }
    .option {
      position: relative; padding: 14px;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 12px; background: rgba(2,6,23,0.35); color: var(--text);
      transition: transform .08s ease, border-color .15s ease, background-color .15s ease;
    }
    .option:hover { transform: translateY(-1px); border-color: rgba(148,163,184,0.35); background: rgba(2,6,23,0.5); }
    .option.correct.revealed { border-color: var(--ok-bd); background: linear-gradient(0deg, rgba(16,185,129,0.06), rgba(16,185,129,0.06)), rgba(2,6,23,0.45); box-shadow: inset 0 0 0 1px rgba(52,211,153,0.35); }
    .option.correct.revealed .chip { margin-left: 8px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--ok-bd); font-size: 11px; color: var(--ok-tx); background: rgba(16,185,129,0.12); }
    footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 22px 18px 22px; border-top: 1px solid rgba(148,163,184,0.15); background: radial-gradient(600px 200px at 100% 100%, rgba(34,211,238,.06), transparent 60%), radial-gradient(800px 300px at 0% 100%, rgba(125,211,252,.05), transparent 60%); }
    .nav { display: flex; gap: 10px; }
    button.nav-btn, button.toggle-btn, button.icon-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 10px; border: 1px solid #374151; background: linear-gradient(180deg, rgba(31,41,55,0.9), rgba(17,24,39,0.9)); color: #e5e7eb; cursor: pointer; transition: transform 0.08s ease, border-color .15s ease, background-color .15s ease; user-select: none; }
    button.icon-btn { padding: 7px 12px; font-size: 11px; line-height: 1; }
    button.nav-btn:hover, button.toggle-btn:hover, button.icon-btn:hover { transform: translateY(-1px); border-color: #4b5563; }
    button.nav-btn:disabled, button.icon-btn:disabled { opacity: .55; cursor: not-allowed; border-color: #374151; background: #1f2937; color: #6b7280; transform: none; }
    .meta { color: var(--muted); font-size: 13px; }
    .warn { color: #fca5a5; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.35); padding: 10px 12px; border-radius: 10px; margin-top: 12px; }
    .info { color: #93c5fd; background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.35); padding: 10px 12px; border-radius: 10px; margin: 12px 22px 0; }
    /* TOOLBAR: izquierda (Mostrar + Barajar), derecha (Atrás/Adelante) */
    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 22px 0 22px; }
    .toolbar .left { display:flex; align-items:center; gap:10px; }
    .toolbar .right { display:flex; align-items:center; gap:10px; }
    @media (min-width: 480px) {
      .container {margin: 50px auto 50px auto;}
      header .badge { font-size: 18px;}
    }
    @media (min-width: 768px) {
      .container {margin: 100px auto 100px auto;}
      header .badge { font-size: 22px;}
    }
  </style>
</head>
<body>

  <div class="container" role="region" aria-label="Visor de preguntas">
    <header>
      <div class="badge" aria-hidden="true">Banco de preguntas</div>
      <div class="right nav">
        <button id="shuffleBtn" class="icon-btn" type="button" title="Reordenar preguntas (R)" aria-label="Reordenar preguntas (barajar) (R)">🔀 Barajar preguntas</button>
        <div id="counter" class="counter" aria-live="polite">— / —</div>
      </div>
    </header>

    <div class="toolbar">
      <div class="left">
        <button id="toggleBtn" class="toggle-btn" type="button" aria-pressed="false" aria-label="Mostrar solución (S)">👁️ Mostrar solución</button>
        <small><span id="examInfo" class="badge"></span></small>
      </div>
      <div class="right nav">
        <button id="prevBtn" class="nav-btn" type="button" aria-label="Anterior">← Atrás</button>
        <button id="nextBtn" class="nav-btn" type="button" aria-label="Siguiente">Adelante →</button>
      </div>
    </div>

    <div class="content">
      <h2 id="questionTitle" class="question-title">Cargando…</h2>
      <ul id="optionsList" class="options" aria-live="polite"></ul>
      <div id="warning" class="warn" style="display:none;"></div>
    </div>

    <footer>
      <div class="meta">Usa ← / → para navegar. Pulsa <strong>S</strong> para mostrar/ocultar la solución. Pulsa <strong>R</strong> para barajar las preguntas. Recarga la página para ordenarlas.</div>
    </footer>
  </div>

  <div id="info" class="info" style="display:none;"></div>

  <script  src="bancoDePreguntas.js"></script>

  <script>
    (function () {
      "use strict";

      let banco = Array.isArray(window.bancoDePreguntas) ? window.bancoDePreguntas : [];
      let idx = 0;
      let showSolution = false;

      const counterEl = document.getElementById("counter");
      const examEl    = document.getElementById("examInfo");
      const titleEl   = document.getElementById("questionTitle");
      const listEl    = document.getElementById("optionsList");
      const warnEl    = document.getElementById("warning");
      const prevBtn   = document.getElementById("prevBtn");
      const nextBtn   = document.getElementById("nextBtn");
      const toggleBtn = document.getElementById("toggleBtn");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const infoEl    = document.getElementById("info");

      const mq = window.matchMedia("(max-width: 480px)");

      function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
      
      function setBtnText(btn, isMobile, textMobile, textDesktop, ariaLabel) {
        btn.textContent = isMobile ? textMobile : textDesktop;
        if (ariaLabel) btn.setAttribute("aria-label", ariaLabel);
      }

      function updateButtonsUI() {
        const isMobile = mq.matches;
        setBtnText(
          toggleBtn,
          isMobile,
          showSolution ? "🙈" : "👁️",
          showSolution ? "🙈 Ocultar solución" : "👁️ Mostrar solución",
          showSolution ? "Ocultar solución (S)" : "Mostrar solución (S)"
        );
        toggleBtn.setAttribute("aria-pressed", String(showSolution));
        setBtnText(shuffleBtn, isMobile, "🔀", "🔀 Barajar preguntas", "Reordenar preguntas (barajar) (R)");
        setBtnText(prevBtn, isMobile, "←", "← Atrás", "Anterior");
        setBtnText(nextBtn, isMobile, "→", "Adelante →", "Siguiente");
      }

      function shuffleInPlace(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      function render() {
        if (!Array.isArray(banco) || banco.length === 0) {
          titleEl.textContent = "No hay preguntas disponibles.";
          listEl.innerHTML = "";
          counterEl.textContent = "0 / 0";
          examEl.textContent = "";
          warnEl.textContent = "Asegúrate de que bancoDePreguntas.js define window.bancoDePreguntas = [ ... ].";
          warnEl.style.display = "";
          prevBtn.disabled = true; nextBtn.disabled = true; toggleBtn.disabled = true; shuffleBtn.disabled = true;
          infoEl.style.display = "none";
          return;
        }

        toggleBtn.disabled = false;
        shuffleBtn.disabled = banco.length <= 1;
        updateButtonsUI();

        const total = banco.length;
        idx = clamp(idx, 0, total - 1);
        const q = banco[idx] || {};

        counterEl.textContent = `${idx + 1} / ${total}`;
        titleEl.textContent = q.pregunta ?? "(Pregunta no disponible)";

        examEl.textContent = "Examen " + q.examen ?? "Pregunta fuera de examen";

        listEl.innerHTML = "";
        const opciones = Array.isArray(q.opciones) ? q.opciones : [];
        const correcta = Number.isInteger(q.correcta) ? q.correcta : -1;

        opciones.forEach((texto, i) => {
          const li = document.createElement("li");
          li.className = "option" + (i === correcta ? " correct" : "") + (i === correcta && showSolution ? " revealed" : "");
          li.setAttribute("role", "listitem");

          const label = document.createElement("span");
          label.textContent = texto;
          li.appendChild(label);

          if (i === correcta && showSolution) {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = mq.matches ? "Correcta" : "Respuesta correcta";
            chip.setAttribute("aria-label", "Respuesta correcta");
            li.appendChild(chip);
          }

          listEl.appendChild(li);
        });

        if (!Array.isArray(q.opciones) || q.opciones.length === 0) {
          warnEl.style.display = "";
          warnEl.textContent = "Esta pregunta no tiene opciones configuradas.";
        } else if (correcta < 0 || correcta >= opciones.length) {
          warnEl.style.display = "";
          warnEl.textContent = `Índice de respuesta correcta fuera de rango (correcta=${q.correcta}). Debe ser 0–${opciones.length - 1}.`;
        } else {
          warnEl.style.display = "none";
          warnEl.textContent = "";
        }

        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx === total - 1;

        infoEl.style.display = "none";

        updateToggleButton();
      }

      mq.addEventListener("change", () => {
        updateButtonsUI();
        render();
      });

      prevBtn.addEventListener("click", () => { idx--; render(); });
      nextBtn.addEventListener("click", () => { idx++; render(); });

      toggleBtn.addEventListener("click", () => {
        showSolution = !showSolution;
        render();
      });

      shuffleBtn.addEventListener("click", () => {
        if (!Array.isArray(banco) || banco.length <= 1) return;
        shuffleInPlace(banco);
        idx = 0; // ir a la primera pregunta de la nueva ordenación
        render();
      });

      window.addEventListener("keydown", (ev) => {
        const key = ev.key.toLowerCase();
        if (key === "arrowleft" && !prevBtn.disabled) { ev.preventDefault(); idx--; render(); }
        if (key === "arrowright" && !nextBtn.disabled) { ev.preventDefault(); idx++; render(); }
        if (key === "s" && !toggleBtn.disabled) { ev.preventDefault(); showSolution = !showSolution; render(); }
        if (key === "r" && !shuffleBtn.disabled) { ev.preventDefault(); shuffleBtn.click(); }
      }, { passive: false });

      render();
    })();
  </script>
</body>
</html>
